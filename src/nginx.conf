worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Home Assistant Ingress web server
    server {
        listen       8099;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            
            # Allow embedding within Home Assistant iframes
            add_header X-Frame-Options SAMEORIGIN;
        }

        # Error pages
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
